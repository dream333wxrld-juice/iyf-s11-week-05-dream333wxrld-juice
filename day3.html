<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 3: Image Remover</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }

        button:hover {
            background-color: #c0392b;
        }

        #toggleImagesBtn {
            background-color: #3498db;
        }

        #toggleImagesBtn:hover {
            background-color: #2980b9;
        }

        .image-gallery {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .image-gallery img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>Image Remover</h1>

    <button id="removeImagesBtn">Remove All Images</button>
    <button id="toggleImagesBtn">Toggle Images</button>

    <div class="image-gallery">
        <img src="https://placehold.co/150x150/3498db/fff?text=Image+1" alt="Placeholder 1">
        <img src="https://placehold.co/150x150/e74c3c/fff?text=Image+2" alt="Placeholder 2">
        <img src="https://placehold.co/150x150/27ae60/fff?text=Image+3" alt="Placeholder 3">
        <img src="https://placehold.co/150x150/f39c12/fff?text=Image+4" alt="Placeholder 4">
    </div>

    <script>
        document.getElementById('removeImagesBtn').addEventListener('click', function() {
            const images = document.querySelectorAll('img');
            images.forEach(img => img.remove());
        });

        document.getElementById('toggleImagesBtn').addEventListener('click', function() {
            const images = document.querySelectorAll('img');
            images.forEach(img => {
                img.style.display = img.style.display === 'none' ? 'block' : 'none';
            });
        });
    </script>

</body>
</html>
